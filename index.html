<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B2P International - Document Portal</title>
    <meta name="description" content="View and download your digital invoices, quotations, and work orders from B2P International." />
    <meta name="robots" content="noindex, nofollow" />
    
    <link rel="manifest" href="/billing/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="B2P Portal" />
    <link rel="apple-touch-icon" href="/billing/logo_b2p.png" />
    
    <!-- Open Graph (WhatsApp & Social Link Previews) -->
    <meta property="og:title" content="B2P International - Document Portal" />
    <meta property="og:description" content="View and download your digital invoices, quotations, and work orders from B2P International." />
    <meta property="og:image" content="https://b2pinternational.com/billing/logo_b2p_international.png?v=5" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="300" />
    <meta property="og:image:height" content="300" />
    <meta property="og:url" content="https://b2pinternational.com" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Bulletproof chunk/bundle reload system
      (function() {
        // Prevent infinite loops if offline
        function reloadPage() {
          var now = Date.now();
          var lastReload = sessionStorage.getItem('last_chunk_reload');
          if (!lastReload || (now - parseInt(lastReload, 10) > 10000)) {
            sessionStorage.setItem('last_chunk_reload', now.toString());
            console.warn('Chunk/script load error detected. Reloading to fetch fresh files...');
            window.location.reload();
          } else {
            console.error('Chunk reload loop prevented. Device might be offline.');
          }
        }

        // 1. Capture global resource load errors (scripts, stylesheets, dynamic chunks)
        window.addEventListener('error', function(e) {
          if (!e) return;
          var target = e.target || e.srcElement;
          var isScriptOrLink = target && (target.localName === 'script' || target.localName === 'link');
          var isChunkMessage = e.message && (
            e.message.indexOf('dynamically imported module') !== -1 ||
            e.message.indexOf('Importing a module script failed') !== -1 ||
            e.message.indexOf('Load failed') !== -1 ||
            e.message.indexOf('TypeError') !== -1
          );
          if (isScriptOrLink || isChunkMessage) {
            reloadPage();
          }
        }, true);

        // 2. Capture promise rejections (failed dynamic import() calls)
        window.addEventListener('unhandledrejection', function(e) {
          if (!e) return;
          var reason = e.reason || '';
          var reasonStr = typeof reason === 'string' ? reason : (reason.message || '');
          var isChunkRejection = reasonStr && (
            reasonStr.indexOf('dynamically imported module') !== -1 ||
            reasonStr.indexOf('Importing a module script failed') !== -1 ||
            reasonStr.indexOf('Load failed') !== -1 ||
            reasonStr.indexOf('Failed to fetch') !== -1
          );
          if (isChunkRejection) {
            reloadPage();
          }
        });
      })();

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/billing/sw.js')
            .then(reg => console.log('ServiceWorker registered successfully:', reg.scope))
            .catch(err => console.log('ServiceWorker registration failed:', err));
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
